name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# T1.1 — Concurrency cancellation: a new push to a branch cancels in-flight
# CI runs on the same ref. Saves ~6 min per redundant push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # T1.2 — Cache Bun's install dir, keyed on bun.lock. Restore-keys lets
      # a partial-key match seed the cache when the lock file changes.
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # T1.3 — Single build invocation. Turbo handles the docs dep order.
      - run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    # PR-only: required so we have access to base/head SHAs for the
    # BASELINE-UPDATE: trailer enforcement step.
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for baseline-trailer check to walk PR commits.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Check capability manifest
        run: bun run scripts/check-capabilities.ts
      - run: bun test
      # T1.5 — North Star Test Gate (Tier 1). On failure, the formatted
      # output (weakness ID, closing commit, recovery commands) is captured
      # to the GitHub step summary so it surfaces in the PR check page.
      - name: North Star Test Gate (Tier 1)
        run: |
          if ! bun run gate:check 2> >(tee gate-stderr.log >&2); then
            {
              echo "## ❌ North Star Test Gate failed"
              echo ''
              echo '```'
              cat gate-stderr.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      # T1.4 — BASELINE-UPDATE: trailer enforcement. PR-only because we need
      # base/head SHAs to walk only the PR's commits.
      - name: Enforce BASELINE-UPDATE trailer when gate baseline changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qE '^harness-reports/integration-control-flow-baseline\.json$'; then
            if ! git log "$BASE_SHA".."$HEAD_SHA" --pretty=%B | grep -q '^BASELINE-UPDATE:'; then
              echo "::error::Gate baseline changed but no BASELINE-UPDATE: trailer found in any commit on this PR." >&2
              echo "Run \`bun run gate:update\` and use the prompted reason as the trailer text." >&2
              exit 1
            fi
            echo "✓ Baseline change has BASELINE-UPDATE: trailer"
          fi

  docs-links:
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Build docs
        working-directory: apps/docs
        run: bunx astro build
      - name: Check links in built HTML
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --accept 200,403,429
            --max-retries 2
            --retry-wait-time 2
            --root-dir apps/docs/dist
            --exclude "^/$"
            --exclude "^/_astro/"
            --exclude "^/sitemap"
            --exclude "^/favicon"
            --exclude "^/\.well-known/"
            --exclude "^https://tylerjrbuell\.github\.io/"
            --exclude "^https://docs\.reactiveagents\.dev/"
            --exclude "^https://huggingface\.co/datasets/"
            --exclude "^https://console\.anthropic\.com"
            --exclude "^https://my\.telegram\.org/"
            --exclude "^http://localhost"
            "apps/docs/dist/**/*.html"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
