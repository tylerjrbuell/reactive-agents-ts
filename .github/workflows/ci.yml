name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build --force

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build --force
      - run: bun test

  docs-links:
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build docs
        working-directory: apps/docs
        run: bunx astro build
      - name: Check links in built HTML
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --accept 200,403,429
            --max-retries 2
            --retry-wait-time 2
            --root-dir apps/docs/dist
            --exclude "^/$"
            --exclude "^/_astro/"
            --exclude "^/sitemap"
            --exclude "^/favicon"
            --exclude "^/\.well-known/"
            --exclude "^https://tylerjrbuell\.github\.io/"
            --exclude "^https://docs\.reactiveagents\.dev/"
            --exclude "^https://huggingface\.co/datasets/"
            --exclude "^https://console\.anthropic\.com"
            --exclude "^https://my\.telegram\.org/"
            "apps/docs/dist/**/*.html"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
