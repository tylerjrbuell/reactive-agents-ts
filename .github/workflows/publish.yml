name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck & test
        run: |
          bun run build
          bun test

      - name: Publish packages in dependency order
        env:
          # NPM_CONFIG_TOKEN is the env var bun publish reads (supported since v1.1.33)
          # BUN_AUTH_TOKEN and NODE_AUTH_TOKEN are NOT read by bun publish
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES=(
            "packages/core"
            "packages/llm-provider"
            "packages/eval"
            "packages/memory"
            "packages/reasoning"
            "packages/tools"
            "packages/guardrails"
            "packages/verification"
            "packages/cost"
            "packages/identity"
            "packages/observability"
            "packages/interaction"
            "packages/orchestration"
            "packages/prompts"
            "packages/a2a"
            "packages/gateway"
            "packages/testing"
            "packages/runtime"
            "packages/reactive-agents"
            "apps/cli"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Publishing $pkg..."
            cd "$pkg"

            # bun publish does NOT correctly resolve workspace:* to local versions —
            # it uses the already-published npm version instead. Pre-process package.json
            # to replace workspace:* with the actual local version before publishing.
            PKG_VERSION=$(node -p "require('./package.json').version")
            # Replace all workspace:* dep references with the real version of each workspace pkg
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const replace = (deps) => {
                if (!deps) return;
                for (const [name, ver] of Object.entries(deps)) {
                  if (ver === 'workspace:*') {
                    // Read the actual version from the workspace package
                    const pkgPath = require.resolve(name + '/package.json', { paths: ['$GITHUB_WORKSPACE'] });
                    deps[name] = require(pkgPath).version;
                  }
                }
              };
              replace(pkg.dependencies);
              replace(pkg.peerDependencies);
              replace(pkg.optionalDependencies);
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            "

            bun publish --access public --no-git-checks || echo "⚠️  $pkg: already published or error, skipping"
            cd "$GITHUB_WORKSPACE"
          done

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1 }
            found && /^## \[/ && !($0 ~ "^## \\[" ver "\\]") { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "No CHANGELOG section found for version ${VERSION}."
            echo "Expected header format: ## [${VERSION}] - YYYY-MM-DD"
            exit 1
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false
