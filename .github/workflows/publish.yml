name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for changesets to detect changed packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # T1.2 — Cache Bun's install dir.
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # T1.7 — Removed `rm -rf .turbo` — Turbo's content-addressed cache is
      # safe to reuse across releases; force-clearing it added ~30-60s per
      # release with no correctness benefit. If a future release needs a
      # clean cache, that's an explicit workflow_dispatch input, not always-on.

      # Separate build and test steps so failures pinpoint cleanly. Previously
      # one combined `bun run build && bun test` step made it harder to tell
      # whether a release halted on build or on test.
      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When changesets are present: opens/updates a "Version Packages" PR
          # When that PR is merged: publishes to npm
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
          # Disable per-package releases — we create one consolidated release below
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create consolidated GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/reactive-agents/package.json').version")

          # Extract release notes for this version from root CHANGELOG.md
          # Tries exact version match first, falls back to first version section
          node -e "
            const fs = require('fs');
            const version = '${VERSION}';
            const log = fs.readFileSync('./CHANGELOG.md', 'utf8');

            // Try exact version match: ## [0.8.0] or ## 0.8.0
            const escaped = version.replace(/\./g, '\\\\.');
            const exact = log.match(new RegExp('## \\\\[?' + escaped + '\\\\]?[^\\n]*\\n([\\s\\S]*?)(?=\\n## \\\\[?\\d+\\\\.\\d+\\\\.\\d+|$)'));

            if (exact) {
              fs.writeFileSync('/tmp/release-notes.md', exact[0].trim());
            } else {
              // Fall back to first non-Unreleased version section
              const first = log.match(/## \[?\d+\.\d+\.\d+\]?[^\n]*\n([\s\S]*?)(?=\n## \[?\d+\.\d+\.\d+|$)/);
              fs.writeFileSync('/tmp/release-notes.md', first ? first[0].trim() : 'See CHANGELOG.md for details.');
            }
          "

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --target main
