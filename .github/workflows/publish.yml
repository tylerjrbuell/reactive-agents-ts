name: Publish to npm

# Tag-driven lockstep release. Push a `vX.Y.Z` tag → this workflow stamps every
# public package to that version, aggregates the changelog, builds, and publishes
# in dependency order (see scripts/release.ts). No changesets/action, no
# "Version Packages" PR — the tag is the version source and the audit point.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to release (e.g. 0.11.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

# One release at a time. A second tag push waits rather than racing npm.
concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No `registry-url:` — it makes setup-node write a placeholder
      # $RUNNER_TEMP/.npmrc and export NPM_CONFIG_USERCONFIG pointing at it.
      # bun honors NPM_CONFIG_USERCONFIG but does NOT expand the
      # ${NODE_AUTH_TOKEN} placeholder, so `bun publish` fails auth. Omitting
      # registry-url leaves $HOME/.npmrc as the sole npm/bun config path.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      # Resolve the target version from the tag (push) or the manual input.
      # `release.ts` requires an explicit semver — this is its single source.
      - name: Resolve release version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?(\+[0-9A-Za-z.]+)?$'; then
            echo "::error::'$VERSION' is not valid semver (tag must be vX.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # release.ts shells `bun publish`. Write the literal token (NOT a
      # ${VAR} placeholder — bun does not interpolate .npmrc the way npm
      # does) to whatever config path is in effect: NPM_CONFIG_USERCONFIG
      # if some action still set it, else $HOME/.npmrc. Fail fast if any
      # placeholder slipped through. This is the v0.11.0 auth fix (#3).
      - name: Authenticate bun + npm to registry
        run: |
          set -euo pipefail
          AUTHFILE="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$AUTHFILE"
          echo "auth written to: $AUTHFILE"
          if grep -qE '\$\{[A-Z_]+\}' "$AUTHFILE"; then
            echo "::error::placeholder unexpanded in $AUTHFILE"; exit 1
          fi
          echo "NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG:-<unset>}"
          echo "config lines (redacted):"
          sed 's/_authToken=.*/_authToken=<redacted>/' "$AUTHFILE"
          echo "npm identity check:"; npm whoami || echo "(npm whoami failed — bun publish may still succeed via .npmrc)"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: bun run build

      # Type gate: full workspace tsc. Catches type debt that esbuild/tsup
      # transpile-only builds skip. Must stay green before any release —
      # this is the gate that blocked v0.11.0 until the TS5103-masked
      # errors were fixed.
      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # Pre-publish gate: pack every workspace package as a tarball, install
      # into a clean project, smoke-test the artifacts that actually ship.
      # Catches the v0.10.4 class of bug (import declared `external` in tsup
      # but missing from `dependencies`).
      - name: Clean-install smoke test
        run: bun run scripts/test-clean-install.ts

      # Dry-run gate: validates package discovery, topological publish order,
      # and already-published classification. Mutates nothing, publishes
      # nothing. Fails the run before any release if the plan is broken.
      - name: Release plan (dry-run gate)
        run: bun scripts/release.ts ${{ steps.ver.outputs.version }} --dry-run

      # Real release: aggregate CHANGELOG, consume changesets, stamp all
      # public packages + root to the single version, build, publish in
      # dependency order. Fail-fast; re-runnable (already-published skipped).
      - name: Release
        run: bun scripts/release.ts ${{ steps.ver.outputs.version }}

      # Tag-driven flow leaves repo package.json unbumped. Sync the release
      # artifacts back to main: VERSION (so `cat VERSION` == npm @latest),
      # the CHANGELOG.md section release.ts just aggregated, and the deletion
      # of the changesets it consumed. Without the latter two, consumed
      # changesets linger on main and re-aggregate into the NEXT release's
      # notes (bit v0.11.2: seven v0.11.0-era notes had to be purged by hand).
      # [skip ci] prevents a docs/publish re-trigger loop.
      # Known tradeoff: if main's CHANGELOG gained edits between the tagged
      # commit and this step, the release-generated copy wins.
      - name: Sync VERSION + CHANGELOG + consumed changesets to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Preserve release.ts outputs from the tag workspace before the
          # branch switch discards them.
          cp CHANGELOG.md "$RUNNER_TEMP/CHANGELOG.release.md"
          ls .changeset/ > "$RUNNER_TEMP/changesets-remaining.txt"
          git fetch origin main
          git checkout -f -B main origin/main
          echo "${{ steps.ver.outputs.version }}" > VERSION
          cp "$RUNNER_TEMP/CHANGELOG.release.md" CHANGELOG.md
          # Remove any changeset note present on main but absent from the
          # post-release workspace (i.e. consumed by release.ts).
          for f in .changeset/*.md; do
            [ -e "$f" ] || continue
            if ! grep -qx "$(basename "$f")" "$RUNNER_TEMP/changesets-remaining.txt"; then
              git rm -q "$f"
            fi
          done
          git add VERSION CHANGELOG.md .changeset/
          if git diff --cached --quiet; then
            echo "release artifacts already synced — nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): sync VERSION/CHANGELOG/changesets → ${{ steps.ver.outputs.version }} [skip ci]"
          git push origin main

      - name: Create consolidated GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # Extract this version's section from root CHANGELOG.md (written by
          # release.ts as `## <version>`). Fall back to first version section.
          node -e "
            const fs = require('fs');
            const version = '${VERSION}';
            const log = fs.readFileSync('./CHANGELOG.md', 'utf8');
            const escaped = version.replace(/\./g, '\\\\.');
            const exact = log.match(new RegExp('## \\\\[?' + escaped + '\\\\]?[^\\n]*\\n([\\s\\S]*?)(?=\\n## \\\\[?\\d+\\\\.\\d+\\\\.\\d+|\$)'));
            if (exact) {
              fs.writeFileSync('/tmp/release-notes.md', exact[0].trim());
            } else {
              const first = log.match(/## \[?\d+\.\d+\.\d+\]?[^\n]*\n([\s\S]*?)(?=\n## \[?\d+\.\d+\.\d+|\$)/);
              fs.writeFileSync('/tmp/release-notes.md', first ? first[0].trim() : 'See CHANGELOG.md for details.');
            }
          "

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --target main
