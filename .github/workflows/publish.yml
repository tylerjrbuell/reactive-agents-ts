name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck & test
        run: |
          bun run build
          bun test

      - name: Publish packages in dependency order
        env:
          # NPM_CONFIG_TOKEN is the env var bun publish reads (supported since v1.1.33)
          # BUN_AUTH_TOKEN and NODE_AUTH_TOKEN are NOT read by bun publish
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES=(
            "packages/core"
            "packages/llm-provider"
            "packages/eval"
            "packages/memory"
            "packages/reasoning"
            "packages/tools"
            "packages/guardrails"
            "packages/verification"
            "packages/cost"
            "packages/identity"
            "packages/observability"
            "packages/interaction"
            "packages/orchestration"
            "packages/prompts"
            "packages/a2a"
            "packages/gateway"
            "packages/testing"
            "packages/runtime"
            "packages/reactive-agents"
            "apps/cli"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Publishing $pkg"
            cd "$pkg"

            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")

            # bun publish resolves workspace:* to the already-published npm version,
            # not the local workspace version. Use our script to fix this first.
            node "$GITHUB_WORKSPACE/scripts/resolve-workspace-deps.mjs" . "$GITHUB_WORKSPACE"

            # Verify no workspace: references remain before publishing
            if grep -q '"workspace:' package.json; then
              echo "❌ ERROR: workspace: references still present in $pkg/package.json after resolution!"
              cat package.json
              exit 1
            fi

            bun publish --access public --no-git-checks \
              && echo "✅ Published $PKG_NAME@$PKG_VERSION" \
              || echo "⚠️  $PKG_NAME@$PKG_VERSION: already published, skipping"

            # Post-publish sanity check: verify the published manifest has correct versions
            sleep 2
            PUBLISHED_DEPS=$(npm view "$PKG_NAME@$PKG_VERSION" dependencies 2>/dev/null || echo "")
            if echo "$PUBLISHED_DEPS" | grep -q "workspace:"; then
              echo "❌ CRITICAL: Published $PKG_NAME@$PKG_VERSION contains workspace: references!"
              exit 1
            fi
            echo "✅ Dep check passed for $PKG_NAME@$PKG_VERSION"

            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1 }
            found && /^## \[/ && !($0 ~ "^## \\[" ver "\\]") { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "No CHANGELOG section found for version ${VERSION}."
            echo "Expected header format: ## [${VERSION}] - YYYY-MM-DD"
            exit 1
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false
