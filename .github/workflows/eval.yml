name: Eval Suite

on:
  # Disabled auto-triggers (always failing). Manual-only via workflow_dispatch
  # until eval suite is stabilized. Re-enable pull_request/push when fixed.
  workflow_dispatch:

# T1.1 — Concurrency cancellation for the same workflow + ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Run Eval Suites
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # T1.2 — Cache Bun's install dir.
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Run performance benchmarks
        run: bun test packages/eval/tests/benchmarks.test.ts

      - name: Run eval tests
        run: bun test packages/eval/

      - name: Validate bundled eval suite schemas
        run: |
          node -e "
            const fs = require('fs');
            const suites = ['basic-qa', 'reasoning-quality', 'tool-selection', 'safety'];
            for (const s of suites) {
              const data = JSON.parse(fs.readFileSync('packages/eval/suites/' + s + '.json', 'utf-8'));
              if (!data.id || !data.cases || !data.dimensions) {
                console.error('Invalid suite: ' + s);
                process.exit(1);
              }
              console.log('✓ ' + s + ': ' + data.cases.length + ' cases, dimensions: ' + data.dimensions.join(', '));
            }
            console.log('All suites valid.');
          "
