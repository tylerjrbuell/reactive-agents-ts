# Docker Compose for the Signal MCP server (repo-maintained image).
#
# Telegram is not bundled here — use upstream [chigwell/telegram-mcp](https://github.com/chigwell/telegram-mcp)
# (e.g. `uvx`, clone + `uv run`, or your own container). See `apps/docs/.../messaging-channels.md`.
#
# Usage:
#   docker compose -f docker/docker-compose.messaging.yml up -d
#
# Prerequisites:
#   - Signal registered: ./scripts/signal-register.sh +1234567890

services:
  signal-mcp:
    build:
      context: ./signal-mcp
    container_name: reactive-agents-signal
    stdin_open: true            # Required for MCP stdio transport
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    deploy:
      resources:
        limits:
          memory: 512m          # JVM (signal-cli) + Bun (MCP server)
          pids: 50
    tmpfs:
      - /tmp:size=50m
    volumes:
      - ../signal-data:/data:rw
    environment:
      - SIGNAL_CLI_CONFIG=/data
      - SIGNAL_USER_ID=${SIGNAL_PHONE_NUMBER}
    restart: unless-stopped
