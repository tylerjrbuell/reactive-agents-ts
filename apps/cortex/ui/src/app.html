<!doctype html>
<html lang="en" class="dark">

    <title>Cortex — Reactive Agents Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <!-- JetBrains Mono for data/code/trace -->

    />

    />
    %sveltekit.head%

  <body
    class="bg-background text-on-surface overflow-hidden h-screen w-screen"
    data-sveltekit-preload-data="hover"

    <div id="svelte" class="h-full w-full">%sveltekit.body%</div>
