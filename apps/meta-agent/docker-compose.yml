# raxd — Docker Compose (monorepo single topology)
# Generated by: rax deploy init --topology single
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   curl http://localhost:3000/health

services:
  agent:
    build:
      context: ../..
      dockerfile: apps/meta-agent/Dockerfile
    container_name: raxd-meta-agent
    restart: unless-stopped
    env_file: .env.production
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    deploy:
      resources:
        limits:
          memory: 512m
          pids: 50
    volumes:
      - agent-data:/app/data
      - drafts:/app/apps/meta-agent/drafts
    ports:
      - "${HEALTH_PORT:-3000}:3000"

  # ── Uncomment for production (replaces SQLite) ──────────────────────────
