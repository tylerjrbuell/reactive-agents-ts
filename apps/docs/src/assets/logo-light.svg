<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Deep violet to teal gradient for light backgrounds -->
    <linearGradient id="edge-l-new" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Reverse gradient for inner connections -->
    <linearGradient id="edge2-l-new" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Core radial gradient -->
    <radialGradient id="core-l-new" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <!-- Node gradient -->
    <radialGradient id="node-l-new" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <!-- Smaller node gradient -->
    <radialGradient id="node-sm-l-new" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <!-- Glow filter for center -->
    <filter id="glow-l-new" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow filter for nodes -->
    <filter id="glow-sm-l-new" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Edges — outer ring connections -->
  <line x1="14" y1="6" x2="34" y2="6" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="6" x2="6" y2="20" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="34" y1="6" x2="42" y2="20" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="20" x2="6" y2="34" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="20" x2="42" y2="34" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="34" x2="18" y2="44" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="34" x2="30" y2="44" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="44" x2="30" y2="44" stroke="url(#edge-l-new)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Edges — connections to center -->
  <line x1="14" y1="6" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="34" y1="6" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6" y1="20" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="42" y1="20" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6" y1="34" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="42" y1="34" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18" y1="44" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="30" y1="44" x2="24" y2="24" stroke="url(#edge2-l-new)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Cross-connections for density -->
  <line x1="6" y1="20" x2="34" y2="6" stroke="url(#edge-l-new)" stroke-width="0.7" opacity="0.4"/>
  <line x1="42" y1="20" x2="14" y2="6" stroke="url(#edge-l-new)" stroke-width="0.7" opacity="0.4"/>
  <line x1="6" y1="34" x2="42" y2="20" stroke="url(#edge-l-new)" stroke-width="0.7" opacity="0.3"/>
  <line x1="42" y1="34" x2="6" y2="20" stroke="url(#edge-l-new)" stroke-width="0.7" opacity="0.3"/>

  <!-- Outer nodes -->
  <circle cx="14" cy="6" r="2.8" fill="url(#node-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="34" cy="6" r="2.8" fill="url(#node-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="6" cy="20" r="2.5" fill="url(#node-sm-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="42" cy="20" r="2.5" fill="url(#node-sm-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="6" cy="34" r="2.5" fill="url(#node-sm-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="42" cy="34" r="2.5" fill="url(#node-sm-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="18" cy="44" r="2.8" fill="url(#node-l-new)" filter="url(#glow-sm-l-new)"/>
  <circle cx="30" cy="44" r="2.8" fill="url(#node-l-new)" filter="url(#glow-sm-l-new)"/>

  <!-- Central core node -->
  <circle cx="24" cy="24" r="5.5" fill="url(#core-l-new)" filter="url(#glow-l-new)"/>
  <circle cx="24" cy="24" r="8" fill="none" stroke="#0891b2" stroke-width="0.6" opacity="0.3"/>
</svg>
