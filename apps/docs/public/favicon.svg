<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="edge-fav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="edge2-fav" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="core-fav" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <radialGradient id="node-fav" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="glow-fav" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="16" cy="16" r="11" fill="#8b5cf6" opacity="0.08"/>

  <!-- Edges — top connections -->
  <line x1="8" y1="4" x2="24" y2="4" stroke="url(#edge-fav)" stroke-width="1"/>
  <line x1="8" y1="4" x2="4" y2="13" stroke="url(#edge-fav)" stroke-width="1"/>
  <line x1="24" y1="4" x2="28" y2="13" stroke="url(#edge-fav)" stroke-width="1"/>

  <!-- Edges to center -->
  <line x1="8" y1="4" x2="16" y2="16" stroke="url(#edge2-fav)" stroke-width="1"/>
  <line x1="24" y1="4" x2="16" y2="16" stroke="url(#edge2-fav)" stroke-width="1"/>
  <line x1="4" y1="13" x2="16" y2="16" stroke="url(#edge2-fav)" stroke-width="1"/>
  <line x1="28" y1="13" x2="16" y2="16" stroke="url(#edge2-fav)" stroke-width="1"/>
  <line x1="4" y1="21" x2="16" y2="16" stroke="url(#edge2-fav)" stroke-width="1"/>
  <line x1="28" y1="21" x2="16" y2="16" stroke="url(#edge2-fav)" stroke-width="1"/>

  <!-- Edges — bottom connections -->
  <line x1="4" y1="13" x2="4" y2="21" stroke="url(#edge-fav)" stroke-width="1"/>
  <line x1="28" y1="13" x2="28" y2="21" stroke="url(#edge-fav)" stroke-width="1"/>
  <line x1="4" y1="21" x2="12" y2="28" stroke="url(#edge-fav)" stroke-width="1"/>
  <line x1="28" y1="21" x2="20" y2="28" stroke="url(#edge-fav)" stroke-width="1"/>

  <!-- Outer nodes -->
  <circle cx="8" cy="4" r="1.8" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="24" cy="4" r="1.8" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="4" cy="13" r="1.5" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="28" cy="13" r="1.5" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="4" cy="21" r="1.5" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="28" cy="21" r="1.5" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="12" cy="28" r="1.8" fill="url(#node-fav)" filter="url(#glow-fav)"/>
  <circle cx="20" cy="28" r="1.8" fill="url(#node-fav)" filter="url(#glow-fav)"/>

  <!-- Central core node -->
  <circle cx="16" cy="16" r="4" fill="url(#core-fav)" filter="url(#glow-fav)"/>
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.25"/>
</svg>
